<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>SnapBooth 📸</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --bg: #0d0920;
        --surf: #19102f;
        --card: #241548;
        --pink: #ff69b4;
        --gold: #ffd700;
        --cyan: #00e5d0;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.42);
        --pglow: 0 0 22px rgba(255, 105, 180, 0.6);
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Mono", "Courier New", monospace;
        overscroll-behavior: none;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse at 15% 15%,
            rgba(180, 0, 255, 0.13) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 85% 85%,
            rgba(255, 105, 180, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            rgba(0, 229, 208, 0.05) 0%,
            transparent 60%
          );
      }

      #app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* ── HEADER ──────────────────────────────────────── */
      .hdr {
        text-align: center;
        padding: 16px 16px 8px;
      }
      .hdr h1 {
        font-family: "Pacifico", cursive;
        font-size: 2.5rem;
        color: var(--pink);
        text-shadow:
          0 0 32px rgba(255, 105, 180, 0.75),
          0 2px 0 rgba(0, 0, 0, 0.35);
      }
      .hdr .sub {
        font-size: 0.6rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--gold);
        margin-top: 2px;
        opacity: 0.85;
      }

      /* ── SHOOT SCREEN ────────────────────────────────── */
      #shoot {
        display: flex;
        flex-direction: column;
      }

      .cam-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        background: #000;
        overflow: hidden;
      }
      #video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        display: block;
      }
      .no-cam {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.78rem;
        text-align: center;
        padding: 20px;
      }
      .no-cam span {
        font-size: 3rem;
      }

      .flip-btn {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 15;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 1.2rem;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        cursor: pointer;
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s;
      }
      .flip-btn:active {
        transform: scale(0.88);
      }

      .thumbs {
        position: absolute;
        bottom: 8px;
        left: 8px;
        display: flex;
        gap: 5px;
        z-index: 12;
      }
      .thumb {
        width: 46px;
        height: 46px;
        border-radius: 7px;
        border: 2px solid var(--pink);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .badge {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 12;
        background: rgba(255, 105, 180, 0.85);
        color: #fff;
        font-size: 0.58rem;
        padding: 4px 9px;
        border-radius: 20px;
        letter-spacing: 1px;
        font-weight: 500;
        backdrop-filter: blur(4px);
      }

      /* Countdown */
      .cdown-wrap {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 25;
      }
      .cdown-num {
        font-family: "Pacifico", cursive;
        font-size: 9rem;
        color: var(--gold);
        text-shadow: 0 0 40px rgba(255, 215, 0, 0.9);
        animation: popIn 0.92s ease-out forwards;
      }
      @keyframes popIn {
        0% {
          transform: scale(2.2);
          opacity: 0;
        }
        25% {
          transform: scale(0.95);
          opacity: 1;
        }
        75% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.75);
          opacity: 0;
        }
      }

      /* Flash */
      .flash-el {
        position: absolute;
        inset: 0;
        background: #fff;
        z-index: 30;
        pointer-events: none;
        animation: doFlash 0.36s ease-out forwards;
      }
      @keyframes doFlash {
        0% {
          opacity: 0.95;
        }
        100% {
          opacity: 0;
        }
      }

      /* ── CONTROLS ─────────────────────────────────────── */
      .ctrl {
        background: var(--surf);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding: 11px 13px 9px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 3px;
        background: var(--card);
        border-radius: 10px;
        padding: 3px;
        margin-bottom: 10px;
      }
      .tab {
        flex: 1;
        padding: 7px 4px;
        border: none;
        background: transparent;
        color: var(--muted);
        font-family: inherit;
        font-size: 0.58rem;
        border-radius: 7px;
        cursor: pointer;
        letter-spacing: 0.7px;
        transition: all 0.18s;
      }
      .tab.on {
        background: var(--pink);
        color: #fff;
        box-shadow: var(--pglow);
      }

      .pane {
        display: none;
      }
      .pane.on {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      /* Option buttons */
      .opt {
        flex: 1;
        min-width: 68px;
        padding: 9px 5px;
        border: 2px solid rgba(255, 255, 255, 0.12);
        background: var(--card);
        color: var(--text);
        font-family: inherit;
        font-size: 0.58rem;
        border-radius: 10px;
        cursor: pointer;
        text-align: center;
        letter-spacing: 0.5px;
        transition: all 0.18s;
      }
      .opt .ico {
        font-size: 1.25rem;
        display: block;
        margin-bottom: 3px;
      }
      .opt.on {
        border-color: var(--pink);
        background: rgba(255, 105, 180, 0.15);
        color: var(--pink);
        box-shadow: 0 0 10px rgba(255, 105, 180, 0.22);
      }

      /* ── SHOOT BUTTON ─────────────────────────────────── */
      .shoot-row {
        display: flex;
        justify-content: center;
        padding: 12px 16px 18px;
      }
      .shoot-btn {
        width: 78px;
        height: 78px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, var(--pink), #a8326a);
        border: 4px solid rgba(255, 255, 255, 0.25);
        box-shadow:
          var(--pglow),
          inset 0 2px 6px rgba(255, 255, 255, 0.25);
        cursor: pointer;
        font-size: 1.9rem;
        transition: transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .shoot-btn:active {
        transform: scale(0.9);
      }
      .shoot-btn:disabled {
        opacity: 0.3;
        cursor: default;
        transform: none;
      }

      /* ── RESULT SCREEN ────────────────────────────────── */
      #result {
        display: none;
        flex-direction: column;
        align-items: center;
        padding: 14px 14px 28px;
        gap: 14px;
      }
      #result.on {
        display: flex;
      }

      .res-title {
        font-family: "Pacifico", cursive;
        font-size: 1.7rem;
        color: var(--gold);
        text-shadow: 0 0 22px rgba(255, 215, 0, 0.65);
      }

      .canvas-area {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 6px 40px rgba(255, 105, 180, 0.35);
        cursor: crosshair;
        width: 100%;
      }
      #strip {
        display: block;
        width: 100%;
        height: auto;
      }

      /* Sticker bar */
      .stk-bar {
        width: 100%;
        background: var(--surf);
        border-radius: 14px;
        padding: 12px;
      }
      .stk-bar p {
        font-size: 0.58rem;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 9px;
      }
      .stk-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .stk-opt {
        width: 40px;
        height: 40px;
        background: var(--card);
        border: 2px solid transparent;
        border-radius: 9px;
        font-size: 1.35rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .stk-opt.on {
        border-color: var(--gold);
        background: rgba(255, 215, 0, 0.12);
        transform: scale(1.12);
      }

      /* Undo btn */
      .undo-btn {
        width: 100%;
        padding: 9px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        color: var(--muted);
        font-family: inherit;
        font-size: 0.65rem;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.15s;
        margin-top: 6px;
      }
      .undo-btn:hover {
        border-color: var(--pink);
        color: var(--pink);
      }

      /* Action buttons */
      .actions {
        display: flex;
        gap: 10px;
        width: 100%;
      }
      .retake-btn {
        flex: 1;
        padding: 13px;
        background: var(--card);
        color: var(--muted);
        border: 2px solid rgba(255, 255, 255, 0.12);
        border-radius: 13px;
        font-family: inherit;
        font-size: 0.72rem;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.15s;
      }
      .save-btn {
        flex: 2;
        padding: 13px;
        background: linear-gradient(135deg, var(--pink) 0%, #a0306a 100%);
        color: #fff;
        border: none;
        border-radius: 13px;
        font-family: inherit;
        font-size: 0.72rem;
        cursor: pointer;
        letter-spacing: 1px;
        box-shadow: var(--pglow);
        transition: transform 0.1s;
      }
      .save-btn:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="hdr">
        <h1>SnapBooth</h1>
        <p class="sub">✦ strike a pose ✦</p>
      </div>

      <!-- ── SHOOT SCREEN ── -->
      <div id="shoot">
        <div class="cam-wrap" id="camWrap">
          <video id="video" autoplay playsinline muted></video>
          <div class="no-cam" id="noCam">
            <span>📷</span>
            <div>
              Camera access needed.<br />Please allow camera permissions.
            </div>
          </div>
          <button class="flip-btn" id="flipBtn" title="Flip camera">🔄</button>
          <div class="thumbs" id="thumbs"></div>
          <div class="badge" id="badge">0 / 4</div>
        </div>

        <div class="ctrl">
          <div class="tabs">
            <button class="tab on" data-tab="layout">📐 Layout</button>
            <button class="tab" data-tab="filter">🎨 Filter</button>
            <button class="tab" data-tab="frame">🖼 Frame</button>
          </div>

          <div id="pane-layout" class="pane on">
            <button class="opt on" data-layout="4-strip">
              <span class="ico">📜</span>4 Strip
            </button>
            <button class="opt" data-layout="2-strip">
              <span class="ico">📋</span>2 Strip
            </button>
            <button class="opt" data-layout="2x2">
              <span class="ico">⊞</span>2×2 Grid
            </button>
            <button class="opt" data-layout="3x3">
              <span class="ico">⊞</span>3×3 Grid
            </button>
            <button class="opt" data-layout="single">
              <span class="ico">🟩</span>Single
            </button>
          </div>
          <div id="pane-filter" class="pane">
            <button class="opt on" data-filter="normal">
              <span class="ico">✅</span>Normal
            </button>
            <button class="opt" data-filter="bw">
              <span class="ico">⬛</span>B&amp;W
            </button>
            <button class="opt" data-filter="vintage">
              <span class="ico">🏵</span>Vintage
            </button>
            <button class="opt" data-filter="vivid">
              <span class="ico">🌈</span>Vivid
            </button>
            <button class="opt" data-filter="cool">
              <span class="ico">🧊</span>Cool
            </button>
            <button class="opt" data-filter="dreamy">
              <span class="ico">🌙</span>Dreamy
            </button>
            <button class="opt" data-filter="sepia">
              <span class="ico">📜</span>Sepia
            </button>
            <button class="opt" data-filter="neon">
              <span class="ico">💜</span>Neon
            </button>
            <button class="opt" data-filter="warm">
              <span class="ico">🔥</span>Warm
            </button>
            <button class="opt" data-filter="dramatic">
              <span class="ico">🎭</span>Dramatic
            </button>
          </div>
          <div id="pane-frame" class="pane">
            <button class="opt on" data-frame="classic">
              <span class="ico">⬜</span>Classic
            </button>
            <button class="opt" data-frame="pink">
              <span class="ico">🌸</span>Pink
            </button>
            <button class="opt" data-frame="film">
              <span class="ico">🎞</span>Film
            </button>
            <button class="opt" data-frame="neon">
              <span class="ico">💜</span>Neon
            </button>
            <button class="opt" data-frame="polaroid">
              <span class="ico">📸</span>Polaroid
            </button>
            <button class="opt" data-frame="vintage">
              <span class="ico">📜</span>Vintage
            </button>
            <button class="opt" data-frame="modern">
              <span class="ico">▢</span>Modern
            </button>
          </div>
        </div>

        <div class="shoot-row">
          <button class="shoot-btn" id="shootBtn">📸</button>
        </div>
      </div>

      <!-- ── RESULT SCREEN ── -->
      <div id="result">
        <div class="res-title">✨ Your Strip!</div>
        <div class="canvas-area" id="canvasArea">
          <canvas id="strip"></canvas>
        </div>
        <div class="stk-bar">
          <p>👆 tap strip to place sticker</p>
          <div class="stk-row" id="stkRow"></div>
          <div style="display: flex; gap: 6px; margin-top: 9px">
            <input
              type="text"
              id="textInput"
              placeholder="Enter text"
              style="
                flex: 1;
                padding: 6px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: var(--card);
                color: var(--text);
                font-family: inherit;
                border-radius: 6px;
              "
            />
            <button
              id="addTextBtn"
              style="
                padding: 6px 12px;
                background: var(--pink);
                color: #fff;
                border: none;
                border-radius: 6px;
                cursor: pointer;
              "
            >
              Add Text
            </button>
          </div>
          <button class="undo-btn" id="undoBtn">↩ Undo last sticker</button>
        </div>
        <div class="actions">
          <button class="retake-btn" id="retakeBtn">↩ Retake</button>
          <button class="save-btn" id="saveBtn">💾 Save Strip</button>
          <button class="retake-btn" id="galleryBtn">🖼 Gallery</button>
        </div>
      </div>

      <!-- ── GALLERY SCREEN ── -->
      <div
        id="gallery"
        style="
          display: none;
          flex-direction: column;
          align-items: center;
          padding: 14px 14px 28px;
          gap: 14px;
        "
      >
        <div class="res-title">🖼 Gallery</div>
        <div
          id="galleryGrid"
          style="
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
          "
        ></div>
        <div class="actions">
          <button class="retake-btn" id="backBtn">← Back</button>
        </div>
      </div>
    </div>
    <script>
      /* ── CONSTANTS ──────────────────────────────────── */
      const STICKERS = [
        "✨",
        "💖",
        "🌟",
        "🎀",
        "🦋",
        "🌈",
        "🔥",
        "😎",
        "🌸",
        "💫",
        "🎉",
        "🍓",
        "🦄",
        "💎",
        "🎵",
        "🌙",
        "⭐",
        "🌺",
        "🐝",
        "🍬",
      ];

      const FILTERS = {
        normal: "none",
        bw: "grayscale(100%) contrast(108%)",
        vintage: "sepia(65%) contrast(92%) brightness(110%) saturate(85%)",
        vivid: "saturate(190%) contrast(112%) brightness(104%)",
        cool: "hue-rotate(175deg) saturate(115%) brightness(96%)",
        dreamy: "brightness(118%) saturate(72%) blur(0.7px)",
        sepia: "sepia(100%)",
        neon: "brightness(120%) saturate(200%) hue-rotate(90deg)",
        warm: "sepia(30%) saturate(150%) brightness(105%)",
        dramatic: "contrast(150%) brightness(90%) saturate(120%)",
      };

      const PHOTO_COUNT = {
        single: 1,
        "2-strip": 2,
        "4-strip": 4,
        "2x2": 4,
        "3x3": 9,
      };

      /* ── STATE ──────────────────────────────────────── */
      let layout = "4-strip";
      let filterKey = "normal";
      let frameKey = "classic";
      let facingMode = "user";
      let photos = [];
      let stream = null;
      let shooting = false;
      let selSticker = "✨";
      let placedStickers = []; // {type: 'emoji'|'text', content, xR, yR}
      let textMode = false;
      let gallery = JSON.parse(
        localStorage.getItem("snapboothGallery") || "[]",
      );

      /* ── DOM REFS ───────────────────────────────────── */
      const video = document.getElementById("video");
      const strip = document.getElementById("strip");
      const canvasArea = document.getElementById("canvasArea");

      /* ── CAMERA ─────────────────────────────────────── */
      async function startCam() {
        if (stream) stream.getTracks().forEach((t) => t.stop());
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode,
              width: { ideal: 1280 },
              height: { ideal: 1280 },
            },
            audio: false,
          });
          video.srcObject = stream;
          document.getElementById("noCam").style.display = "none";
          video.style.display = "";
        } catch {
          document.getElementById("noCam").style.display = "flex";
          video.style.display = "none";
        }
      }

      document.getElementById("flipBtn").addEventListener("click", () => {
        facingMode = facingMode === "user" ? "environment" : "user";
        startCam();
      });

      /* ── TABS ───────────────────────────────────────── */
      document.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((b) => b.classList.remove("on"));
          document
            .querySelectorAll(".pane")
            .forEach((p) => p.classList.remove("on"));
          btn.classList.add("on");
          document
            .getElementById("pane-" + btn.dataset.tab)
            .classList.add("on");
        });
      });

      document.querySelectorAll("[data-layout]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("[data-layout]")
            .forEach((b) => b.classList.remove("on"));
          btn.classList.add("on");
          layout = btn.dataset.layout;
          localStorage.setItem(
            "snapboothPrefs",
            JSON.stringify({ layout, filterKey, frameKey }),
          );
          updateBadge(0);
        });
      });

      document.querySelectorAll("[data-filter]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("[data-filter]")
            .forEach((b) => b.classList.remove("on"));
          btn.classList.add("on");
          filterKey = btn.dataset.filter;
          localStorage.setItem(
            "snapboothPrefs",
            JSON.stringify({ layout, filterKey, frameKey }),
          );
          video.style.filter = FILTERS[filterKey];
        });
      });

      document.querySelectorAll("[data-frame]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("[data-frame]")
            .forEach((b) => b.classList.remove("on"));
          btn.classList.add("on");
          frameKey = btn.dataset.frame;
          localStorage.setItem(
            "snapboothPrefs",
            JSON.stringify({ layout, filterKey, frameKey }),
          );
        });
      });

      function updateBadge(n) {
        document.getElementById("badge").textContent =
          `${n} / ${PHOTO_COUNT[layout]}`;
      }

      /* ── SHOOT SEQUENCE ─────────────────────────────── */
      document.getElementById("shootBtn").addEventListener("click", startShoot);

      async function startShoot() {
        if (shooting) return;
        shooting = true;
        document.getElementById("shootBtn").disabled = true;
        photos = [];
        placedStickers = [];
        const cnt = PHOTO_COUNT[layout];
        buildThumbs(cnt);
        updateBadge(0);

        for (let i = 0; i < cnt; i++) {
          await doCountdown();
          const url = snapPhoto();
          doFlash();
          photos.push(url);
          updateBadge(i + 1);
          fillThumb(i, url);
          if (i < cnt - 1) await sleep(700);
        }

        shooting = false;
        document.getElementById("shootBtn").disabled = false;
        await sleep(450);
        showResult();
      }

      function buildThumbs(n) {
        const el = document.getElementById("thumbs");
        el.innerHTML = "";
        for (let i = 0; i < n; i++) {
          const d = document.createElement("div");
          d.className = "thumb";
          d.id = "th" + i;
          d.textContent = "📷";
          el.appendChild(d);
        }
      }

      function fillThumb(i, url) {
        const d = document.getElementById("th" + i);
        const img = document.createElement("img");
        img.src = url;
        d.textContent = "";
        d.appendChild(img);
      }

      async function doCountdown() {
        const wrap = document.getElementById("camWrap");
        for (let n = 3; n >= 1; n--) {
          playBeep(600 + n * 100, 300);
          await new Promise((res) => {
            const ov = document.createElement("div");
            ov.className = "cdown-wrap";
            const sp = document.createElement("span");
            sp.className = "cdown-num";
            sp.textContent = n;
            ov.appendChild(sp);
            wrap.appendChild(ov);
            setTimeout(() => {
              ov.remove();
              res();
            }, 920);
          });
        }
      }

      function snapPhoto() {
        const c = document.createElement("canvas");
        const vw = video.videoWidth || 640;
        const vh = video.videoHeight || 640;
        const sz = Math.min(vw, vh);
        const sx = (vw - sz) / 2;
        const sy = (vh - sz) / 2;
        c.width = 400;
        c.height = 400;
        const ctx = c.getContext("2d");
        ctx.filter = FILTERS[filterKey];
        if (facingMode === "user") {
          ctx.translate(400, 0);
          ctx.scale(-1, 1);
        }
        ctx.drawImage(video, sx, sy, sz, sz, 0, 0, 400, 400);
        ctx.filter = "none";
        return c.toDataURL("image/jpeg", 0.9);
      }

      function doFlash() {
        playShutter();
        const wrap = document.getElementById("camWrap");
        const f = document.createElement("div");
        f.className = "flash-el";
        wrap.appendChild(f);
        setTimeout(() => f.remove(), 360);
      }

      /* ── SOUNDS ────────────────────────────────────── */
      function playBeep(frequency = 800, duration = 200) {
        const audioContext = new (
          window.AudioContext || window.webkitAudioContext
        )();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.frequency.value = frequency;
        oscillator.type = "sine";
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(
          0.01,
          audioContext.currentTime + duration / 1000,
        );
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + duration / 1000);
      }

      function playShutter() {
        playBeep(1000, 100);
      }

      /* ── RESULT ─────────────────────────────────────── */
      function showResult() {
        document.getElementById("shoot").style.display = "none";
        document.getElementById("result").classList.add("on");
        buildStickerRow();
        renderStrip();
      }

      function showShoot() {
        document.getElementById("shoot").style.display = "";
        document.getElementById("result").classList.remove("on");
        photos = [];
        placedStickers = [];
        updateBadge(0);
        document.getElementById("thumbs").innerHTML = "";
      }

      document.getElementById("retakeBtn").addEventListener("click", showShoot);
      document
        .getElementById("galleryBtn")
        .addEventListener("click", showGallery);
      document.getElementById("backBtn").addEventListener("click", showResult);

      function showGallery() {
        document.getElementById("result").classList.remove("on");
        document.getElementById("gallery").style.display = "flex";
        renderGallery();
      }

      function showResult() {
        document.getElementById("gallery").style.display = "none";
        document.getElementById("result").classList.add("on");
      }

      function renderGallery() {
        const grid = document.getElementById("galleryGrid");
        grid.innerHTML = "";
        gallery.forEach((item, i) => {
          const img = document.createElement("img");
          img.src = item.dataURL;
          img.style.width = "100px";
          img.style.height = "100px";
          img.style.objectFit = "cover";
          img.style.borderRadius = "8px";
          img.style.cursor = "pointer";
          img.addEventListener("click", () => {
            const a = document.createElement("a");
            a.download = `gallery-${item.date}.jpg`;
            a.href = item.dataURL;
            a.click();
          });
          grid.appendChild(img);
        });
      }
      document.getElementById("undoBtn").addEventListener("click", () => {
        if (placedStickers.length) {
          placedStickers.pop();
          renderStrip();
        }
      });

      function buildStickerRow() {
        const row = document.getElementById("stkRow");
        row.innerHTML = "";
        STICKERS.forEach((s) => {
          const b = document.createElement("button");
          b.className = "stk-opt" + (s === selSticker ? " on" : "");
          b.textContent = s;
          b.addEventListener("click", () => {
            selSticker = s;
            document
              .querySelectorAll(".stk-opt")
              .forEach((x) => x.classList.remove("on"));
            b.classList.add("on");
          });
          row.appendChild(b);
        });
      }

      canvasArea.addEventListener("click", (e) => {
        const rect = strip.getBoundingClientRect();
        placedStickers.push({
          type: "emoji",
          content: selSticker,
          xR: (e.clientX - rect.left) / rect.width,
          yR: (e.clientY - rect.top) / rect.height,
        });
        renderStrip();
      });

      document.getElementById("addTextBtn").addEventListener("click", () => {
        const text = document.getElementById("textInput").value.trim();
        if (text) {
          placedStickers.push({
            type: "text",
            content: text,
            xR: 0.5,
            yR: 0.5,
          });
          document.getElementById("textInput").value = "";
          renderStrip();
        }
      });

      /* ── RENDER STRIP ───────────────────────────────── */
      async function renderStrip() {
        const ctx = strip.getContext("2d");
        const SZ = 360; // square photo slot size
        const PAD = 18; // outer padding
        const GAP = 10; // gap between photos

        /* Layout geometry */
        let W, H, slots;
        switch (layout) {
          case "single":
            W = SZ + PAD * 2;
            H = SZ + PAD * 2;
            slots = [{ x: PAD, y: PAD }];
            break;
          case "2-strip":
            W = SZ + PAD * 2;
            H = SZ * 2 + GAP + PAD * 2;
            slots = [
              { x: PAD, y: PAD },
              { x: PAD, y: PAD + SZ + GAP },
            ];
            break;
          case "4-strip":
            W = SZ + PAD * 2;
            H = SZ * 4 + GAP * 3 + PAD * 2;
            slots = [0, 1, 2, 3].map((i) => ({
              x: PAD,
              y: PAD + i * (SZ + GAP),
            }));
            break;
          case "2x2":
            W = SZ * 2 + GAP + PAD * 2;
            H = SZ * 2 + GAP + PAD * 2;
            slots = [
              { x: PAD, y: PAD },
              { x: PAD + SZ + GAP, y: PAD },
              { x: PAD, y: PAD + SZ + GAP },
              { x: PAD + SZ + GAP, y: PAD + SZ + GAP },
            ];
            break;
          case "3x3":
            W = SZ * 3 + GAP * 2 + PAD * 2;
            H = SZ * 3 + GAP * 2 + PAD * 2;
            slots = [];
            for (let row = 0; row < 3; row++) {
              for (let col = 0; col < 3; col++) {
                slots.push({
                  x: PAD + col * (SZ + GAP),
                  y: PAD + row * (SZ + GAP),
                });
              }
            }
            break;
          default:
            W = SZ + PAD * 2;
            H = SZ + PAD * 2;
            slots = [{ x: PAD, y: PAD }];
        }

        /* Frame tweaks */
        let extraB = 0;
        let extraL = 0;
        if (frameKey === "polaroid") extraB = 56;
        if (frameKey === "film") {
          extraL = 30;
          slots = slots.map((s) => ({ ...s, x: s.x + extraL }));
          W += extraL * 2;
        }

        strip.width = W;
        strip.height = H + extraB;

        /* 1 ▸ Background */
        drawBg(ctx, W, H + extraB, frameKey);

        /* 2 ▸ Load + draw photos */
        const imgs = await Promise.all(photos.map(loadImg));
        imgs.forEach((img, i) => {
          const sl = slots[i];
          if (!sl || !img) return;
          drawPhoto(ctx, img, sl.x, sl.y, SZ, SZ, frameKey);
        });

        /* 3 ▸ Empty slot placeholders */
        const cnt = PHOTO_COUNT[layout];
        for (let i = photos.length; i < cnt; i++) {
          const sl = slots[i];
          if (!sl) continue;
          ctx.fillStyle = "#ccc";
          ctx.fillRect(sl.x, sl.y, SZ, SZ);
        }

        /* 4 ▸ Frame overlays */
        if (frameKey === "film") drawFilm(ctx, W, H + extraB, extraL);
        if (frameKey === "polaroid") drawPolaroidFooter(ctx, W, H + extraB);
        if (frameKey === "neon") drawNeonBorder(ctx, W, H + extraB);

        /* 5 ▸ Stickers */
        ctx.textBaseline = "middle";
        ctx.textAlign = "center";
        placedStickers.forEach((s) => {
          const cx = s.xR * W;
          const cy = s.yR * (H + extraB);
          if (s.type === "emoji") {
            ctx.font = "52px serif";
            ctx.fillText(s.content, cx, cy);
          } else if (s.type === "text") {
            ctx.font = "bold 24px 'DM Mono', monospace";
            ctx.fillStyle = "#000";
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.strokeText(s.content, cx, cy);
            ctx.fillText(s.content, cx, cy);
          }
        });
      }

      function loadImg(src) {
        return new Promise((res) => {
          const img = new Image();
          img.onload = () => res(img);
          img.onerror = () => res(null);
          img.src = src;
        });
      }

      /* Frame background */
      function drawBg(ctx, W, H, frame) {
        const colors = {
          classic: "#ffffff",
          pink: "#ffe4f0",
          film: "#0e0e0e",
          neon: "#08041a",
          polaroid: "#fffcf0",
          vintage: "#f5f5dc",
          modern: "#f0f0f0",
        };
        ctx.fillStyle = colors[frame] || "#fff";
        ctx.fillRect(0, 0, W, H);
      }

      /* Photo slot drawing */
      function drawPhoto(ctx, img, x, y, w, h, frame) {
        ctx.save();
        /* Border per frame */
        if (frame === "pink") {
          ctx.fillStyle = "#ff85bb";
          ctx.fillRect(x - 4, y - 4, w + 8, h + 8);
        } else if (frame === "vintage") {
          ctx.strokeStyle = "#8b4513";
          ctx.lineWidth = 6;
          ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);
        } else if (frame === "modern") {
          ctx.fillStyle = "#333";
          ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
        }
        /* Clip & draw */
        ctx.beginPath();
        ctx.rect(x, y, w, h);
        ctx.clip();
        ctx.drawImage(img, x, y, w, h);
        ctx.restore();
      }

      /* Film strip sprockets */
      function drawFilm(ctx, W, H, side) {
        ctx.save();
        /* Side strips */
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, side, H);
        ctx.fillRect(W - side, 0, side, H);
        /* Sprocket holes */
        ctx.fillStyle = "#080808";
        const hW = side - 8,
          hH = 12,
          hR = 3;
        for (let y = 14; y < H - 12; y += 26) {
          roundRect(ctx, 4, y, hW, hH, hR);
          ctx.fill();
          roundRect(ctx, W - side + 4, y, hW, hH, hR);
          ctx.fill();
        }
        /* Side label */
        ctx.fillStyle = "#444";
        ctx.font = "7px monospace";
        ctx.textAlign = "center";
        ctx.save();
        ctx.translate(side / 2, H / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText("✦ SNAPBOOTH ✦", 0, 0);
        ctx.restore();
        ctx.restore();
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      /* Polaroid footer */
      function drawPolaroidFooter(ctx, W, H) {
        ctx.save();
        ctx.fillStyle = "#bbb";
        ctx.font = "13px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText("SnapBooth  📸", W / 2, H - 18);
        ctx.restore();
      }

      /* Neon border */
      function drawNeonBorder(ctx, W, H) {
        ctx.save();
        ctx.strokeStyle = "#cc00ff";
        ctx.lineWidth = 3;
        ctx.shadowColor = "#cc00ff";
        ctx.shadowBlur = 22;
        ctx.strokeRect(5, 5, W - 10, H - 10);
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#aa00ee";
        ctx.font = "bold 10px monospace";
        ctx.textAlign = "center";
        ctx.shadowColor = "#cc00ff";
        ctx.shadowBlur = 8;
        ctx.fillText("★ S N A P B O O T H ★", W / 2, H - 8);
        ctx.restore();
      }

      /* ── SAVE ───────────────────────────────────────── */
      document.getElementById("saveBtn").addEventListener("click", async () => {
        await renderStrip();
        await sleep(200);
        const dataURL = strip.toDataURL("image/jpeg", 0.93);
        const a = document.createElement("a");
        a.download = `snapbooth-${Date.now()}.jpg`;
        a.href = dataURL;
        a.click();
        // Save to gallery
        gallery.push({ dataURL, date: Date.now() });
        localStorage.setItem("snapboothGallery", JSON.stringify(gallery));
      });

      /* ── INIT ───────────────────────────────────────── */
      updateBadge(0);
      startCam();
      // Load preferences
      const prefs = JSON.parse(localStorage.getItem("snapboothPrefs") || "{}");
      if (prefs.layout) layout = prefs.layout;
      if (prefs.filterKey) filterKey = prefs.filterKey;
      if (prefs.frameKey) frameKey = prefs.frameKey;
      // Update UI
      document
        .querySelectorAll("[data-layout]")
        .forEach((b) => b.classList.toggle("on", b.dataset.layout === layout));
      document
        .querySelectorAll("[data-filter]")
        .forEach((b) =>
          b.classList.toggle("on", b.dataset.filter === filterKey),
        );
      document
        .querySelectorAll("[data-frame]")
        .forEach((b) => b.classList.toggle("on", b.dataset.frame === frameKey));
      video.style.filter = FILTERS[filterKey];
    </script>
  </body>
</html>
